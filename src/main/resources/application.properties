spring.application.name=auto-parts
spring.datasource.url=jdbc:mysql://localhost:3306/auto_parts
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Use a MariaDB-specific dialect to avoid SQL syntax (e.g. "FOR UPDATE OF ...")
# Adjust to match your MariaDB server version if needed (103/106/107)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

